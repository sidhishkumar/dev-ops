services:

  nodejs-server:
    image : chaicode:latest
    deploy:
      replicas: 5
    networks: 
      - chaicode-internal

  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - chaicode-internal

networks:
  chaicode-internal:
    driver: bridge
  