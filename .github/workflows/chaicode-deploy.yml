name: Deploy Nodejs code on Excloud
on:
  push: 
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}


      - name: set up Docker Buildx
        uses: docker/build-push-action@v4

      - name: Build and push Docker image
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME }}/chaicode:latest .
          docker push ${{ vars.DOCKER_USERNAME }}/chaicode:latest
     
      - name: Deploy to Excloud
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: 210.79.129.247
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # CD /home/ubuntu/dev-ops
            cd /home/ubuntu 

            # git pull
            git pull origin main

            # make sure pull the fresh copy of image chaicode:latest
            sudo docker compose pull ${{ vars.DOCKER_USERNAME }}/chaicode:latest
            
            # docker compose up -d
            sudo docker compose up -d
            sudo docker image prone -f